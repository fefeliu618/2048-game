<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048 网页游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            background: #faf8ef;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-size: 48px;
            color: #776e65;
            margin-bottom: 10px;
        }

        .score-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .score-box {
            background: #bbada0;
            padding: 10px 20px;
            border-radius: 6px;
            text-align: center;
            color: white;
        }

        .score-label {
            font-size: 12px;
            text-transform: uppercase;
        }

        .score-value {
            font-size: 24px;
            font-weight: bold;
        }

        .new-game-btn {
            background: #8f7a66;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .new-game-btn:hover {
            background: #9f8b77;
        }

        .game-container {
            background: #bbada0;
            border-radius: 6px;
            padding: 10px;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1;
            position: relative;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            height: 100%;
        }

        .grid-cell {
            background: #cdc1b4;
            border-radius: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: bold;
            color: #776e65;
            transition: transform 0.1s ease;
        }

        .tile-2 { background: #eee4da; }
        .tile-4 { background: #ede0c8; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 32px; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 32px; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 32px; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 24px; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 24px; }
        .tile-super { background: #3c3a32; color: #f9f6f2; font-size: 20px; }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(238, 228, 218, 0.73);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 6px;
            display: none;
        }

        .game-over.show {
            display: flex;
        }

        .game-over-text {
            font-size: 40px;
            font-weight: bold;
            color: #776e65;
            margin-bottom: 20px;
        }

        .instructions {
            margin-top: 20px;
            color: #776e65;
            font-size: 14px;
            text-align: center;
            max-width: 500px;
        }

        @media (max-width: 520px) {
            h1 { font-size: 36px; }
            .grid-cell { font-size: 28px; }
            .tile-128, .tile-256, .tile-512 { font-size: 22px; }
            .tile-1024, .tile-2048 { font-size: 16px; }
            .tile-super { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>2048</h1>
        <div class="score-container">
            <div class="score-box">
                <div class="score-label">分数</div>
                <div class="score-value" id="score">0</div>
            </div>
            <button class="new-game-btn" onclick="initGame()">新游戏</button>
        </div>
    </div>

    <div class="game-container" id="gameContainer">
        <div class="grid-container" id="grid"></div>
        <div class="game-over" id="gameOver">
            <div class="game-over-text">游戏结束!</div>
            <button class="new-game-btn" onclick="initGame()">再玩一次</button>
        </div>
    </div>

    <div class="instructions">
        <p>电脑上：使用方向键或鼠标滑动</p>
        <p>手机上：触摸滑动</p>
        <p>相同数字合并，得到 2048 获胜！</p>
    </div>

    <script>
        let grid = [];
        let score = 0;
        let gameOver = false;

        // 初始化游戏
        function initGame() {
            grid = Array(4).fill().map(() => Array(4).fill(0));
            score = 0;
            gameOver = false;
            document.getElementById('gameOver').classList.remove('show');
            document.getElementById('score').textContent = '0';
            addNewTile();
            addNewTile();
            renderGrid();
        }

        // 添加新方块
        function addNewTile() {
            let emptyCells = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 0) {
                        emptyCells.push({r, c});
                    }
                }
            }
            if (emptyCells.length > 0) {
                let {r, c} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                grid[r][c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        // 渲染网格
        function renderGrid() {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    let cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    let value = grid[r][c];
                    if (value > 0) {
                        cell.classList.add('tile-' + (value <= 2048 ? value : 'super'));
                        cell.textContent = value;
                    }
                    gridEl.appendChild(cell);
                }
            }
        }

        // 移动逻辑
        function move(direction) {
            if (gameOver) return;

            let moved = false;
            let newGrid = JSON.parse(JSON.stringify(grid));

            if (direction === 'left' || direction === 'right') {
                for (let r = 0; r < 4; r++) {
                    let row = newGrid[r].filter(v => v !== 0);
                    if (direction === 'right') row.reverse();
                    
                    for (let i = 0; i < row.length - 1; i++) {
                        if (row[i] === row[i + 1]) {
                            row[i] *= 2;
                            score += row[i];
                            row[i + 1] = 0;
                        }
                    }
                    
                    row = row.filter(v => v !== 0);
                    while (row.length < 4) row.push(0);
                    if (direction === 'right') row.reverse();
                    
                    if (newGrid[r].join(',') !== row.join(',')) moved = true;
                    newGrid[r] = row;
                }
            } else {
                for (let c = 0; c < 4; c++) {
                    let col = [newGrid[0][c], newGrid[1][c], newGrid[2][c], newGrid[3][c]];
                    col = col.filter(v => v !== 0);
                    if (direction === 'down') col.reverse();
                    
                    for (let i = 0; i < col.length - 1; i++) {
                        if (col[i] === col[i + 1]) {
                            col[i] *= 2;
                            score += col[i];
                            col[i + 1] = 0;
                        }
                    }
                    
                    col = col.filter(v => v !== 0);
                    while (col.length < 4) col.push(0);
                    if (direction === 'down') col.reverse();
                    
                    for (let r = 0; r < 4; r++) {
                        if (grid[r][c] !== col[r]) moved = true;
                        newGrid[r][c] = col[r];
                    }
                }
            }

            if (moved) {
                grid = newGrid;
                document.getElementById('score').textContent = score;
                addNewTile();
                renderGrid();
                checkGameOver();
            }
        }

        // 检查游戏结束
        function checkGameOver() {
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 0) return;
                    if (c < 3 && grid[r][c] === grid[r][c + 1]) return;
                    if (r < 3 && grid[r][c] === grid[r + 1][c]) return;
                }
            }
            gameOver = true;
            document.getElementById('gameOver').classList.add('show');
        }

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
                const directions = {
                    'ArrowUp': 'up',
                    'ArrowDown': 'down', 
                    'ArrowLeft': 'left',
                    'ArrowRight': 'right'
                };
                move(directions[e.key]);
            }
        });

        // 触摸和鼠标滑动
        let startX, startY, endX, endY;
        const container = document.getElementById('gameContainer');

        function handleStart(x, y) {
            startX = x;
            startY = y;
        }

        function handleEnd(x, y) {
            if (gameOver) return;
            endX = x;
            endY = y;
            
            let dx = endX - startX;
            let dy = endY - startY;
            
            let minSwipe = 30;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > minSwipe) {
                    move(dx > 0 ? 'right' : 'left');
                }
            } else {
                if (Math.abs(dy) > minSwipe) {
                    move(dy > 0 ? 'down' : 'up');
                }
            }
        }

        // 触摸事件
        container.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleStart(e.touches[0].clientX, e.touches[0].clientY);
        }, {passive: false});

        container.addEventListener('touchend', (e) => {
            e.preventDefault();
            handleEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
        }, {passive: false});

        // 鼠标事件
        container.addEventListener('mousedown', (e) => {
            handleStart(e.clientX, e.clientY);
        });

        container.addEventListener('mouseup', (e) => {
            handleEnd(e.clientX, e.clientY);
        });

        // 启动游戏
        initGame();
    </script>
</body>
</html>
